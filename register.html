<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link href="styles.css" rel="stylesheet" type="text/css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Exo+2:ital,wght@0,100..900;1,100..900&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Spline+Sans:wght@300..700&family=Zen+Kaku+Gothic+Antique&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
      <h1>Create your account</h1>
      <p style="margin-top: -1rem; margin-bottom: 3rem;color: darkgray;">Let’s get started with your 30 days free trial</p>
      <form id="form">
        <p class="sub">Name<span style="color: red; margin : 0">*</span></p>
        <input id="name" placeholder="johndoe"/>
        <p class="error1 error"></p>
        <p class="sub">Email<span style="color: red; margin : 0">*</span></p>
        <input id="email" placeholder="johndoe@gmail.com"/>
        <p class="error2 error"></p>
        <p class="sub">Password<span style="color: red; margin : 0">*</span></p>
        <input type="password" id="pwd" placeholder="*******"/>
        <p style="max-width: 30rem; color: darkgray; margin-top: 0.1rem">Passwords needs to have a minimal of 8 characters, 1 uppercase and 1 symbol</p>
        <p class="error3 error"></p>
        <p class="sub">Retype Password<span style="color: red; margin : 0">*</span></p>
        <input type="password" id="conf_pwd" placeholder="*******"/>
        <p class="error4 error"></p>
        <div class="cbgroup"> 
            <input type="checkbox" id="cb"/>
            <label for="cb" style="color: darkgray; text-align : center">I agree to all term, privacy policy and fees</label>
        </div>
        <button type="submit" id="submit">Sign Up</button>
      </form>
        <span>Already have an account? <a href="login.html">Log in</a></span>
    </div>

    <script>
        let users = [];

        const form = document.getElementById("form");
        const nameInput = document.getElementById("name");
        const emailInput = document.getElementById("email");
        const pwdInput = document.getElementById("pwd");
        const conf_pwdInput = document.getElementById("conf_pwd");

        const setError = (cls, msg) => document.querySelector(cls).textContent = msg;

        nameInput.addEventListener("keyup", () => {
            setError(".error1", nameInput.value.trim() === "" ? "This field can't be empty" : "");
        });

        emailInput.addEventListener("keyup", () => {
            if (emailInput.value.trim() === "") {
                setError(".error2", "This field can't be empty");
            } else if (!emailInput.value.includes("@")) {
                setError(".error2", "Email is not valid");
            } else {
                setError(".error2", "");
            }
        });

        pwdInput.addEventListener("keyup", () => {
            const val = pwdInput.value;
            const hasUpperCase = /[A-Z]/.test(val);
            const hasSymbol = /[!@#$%^&*(),.?":{}|<>]/.test(val);
            
            if (val.trim() === "") {
                setError(".error3", "This field can't be empty");
            } else if (val.length < 8) {
                setError(".error3", "Password too short");
            } else if (!hasUpperCase) {
                setError(".error3", "Must include at least one uppercase character");
            } else if (!hasSymbol) {
                setError(".error3", "Must include at least one symbol");
            } else {
                setError(".error3", "");
            }
        });

        conf_pwdInput.addEventListener("keyup", () => {
            if (conf_pwdInput.value.trim() === "") {
                setError(".error4", "This field can't be empty");
            } else if (conf_pwdInput.value !== pwdInput.value) {
                setError(".error4", "Passwords do not match");
            } else {
                setError(".error4", "");
            }
        });

        form.addEventListener("submit", function(e) {
            e.preventDefault();
            let valid = true;

            if (nameInput.value.trim() === "") { setError(".error1", "This field can't be empty"); valid = false; }
            if (!emailInput.value.includes("@")) { setError(".error2", "Invalid Email"); valid = false; }
            
            const val = pwdInput.value;
            const hasUpperCase = /[A-Z]/.test(val);
            const hasSymbol = /[!@#$%^&*(),.?":{}|<>]/.test(val);

            if (val.length < 8 || !hasUpperCase || !hasSymbol) {
                setError(".error3", "Password requirements not met");
                valid = false;
            }

            const isEmailTaken = users.some(user => user.email === emailInput.value.trim());
            if (isEmailTaken) {
                setError(".error2", "This email is already registered");
                return;
            }

            if (conf_pwdInput.value !== pwdInput.value) {
                setError(".error4", "Passwords do not match");
                valid = false;
            }

            if (valid) {
                const newUser = {
                    id: Date.now(),
                    username: nameInput.value.trim(),
                    email: emailInput.value.trim(),
                    password: pwdInput.value
                };

                let curUser = JSON.parse(localStorage.getItem("userDatabase")) || [];
                curUser.push(newUser);
                localStorage.setItem("userDatabase", JSON.stringify(curUser));
                users.push(newUser);
                form.reset();
                alert("Form submitted successfully!");
                window.location.href = "login.html";
            }
        });
    </script>
</body>
</html>
